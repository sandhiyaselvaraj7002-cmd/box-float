<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Gift For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- The Gift Box -->
        <div class="gift-container" id="giftBox" onclick="openGift()">
            <div class="gift-lid"></div>
            <div class="gift-box-body">
                <div class="ribbon"></div>
            </div>
            <p class="instruction">Click to open your gift MR VINOTH...</p>
        </div>

        <!-- The Memories (Hidden until box is opened) -->
        <div id="memory-field" class="hidden">
            <h1 class="birthday-wish">Happy Birthday! ❤️</h1>
            <p class="sub-text">Click every heart to see a memory...</p>
            <!-- Hearts will be generated by JavaScript -->
        </div>
    </div>

    <!-- The Modal for showing the memory -->
    <div id="memoryModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
